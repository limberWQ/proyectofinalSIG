{% extends "base.html" %}
{% block title %}Editar pasajero{% endblock %}
{% block content %}
<h2 class="mb-2">Editar pasajero</h2>

<div class="card" style="max-width:500px;">
    <form method="POST">
        <div class="form-group">
            <label for="ci">CI</label>
            <input type="text" id="ci" name="ci" required maxlength="20" value="{{ pasajero.ci }}">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="nombres">Nombres</label>
                <input type="text" id="nombres" name="nombres" required maxlength="100" value="{{ pasajero.nombres }}">
            </div>
            <div class="form-group">
                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos" name="apellidos" required maxlength="100" value="{{ pasajero.apellidos }}">
            </div>
        </div>
        <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" name="telefono" maxlength="20" value="{{ pasajero.telefono or '' }}">
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Guardar cambios</button>
            <a href="{{ url_for('pasajeros.listar') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
