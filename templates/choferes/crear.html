{% extends "base.html" %}
{% block title %}Nuevo chofer{% endblock %}
{% block content %}
<h2 class="mb-2">Registrar chofer</h2>

<div class="card" style="max-width:500px;">
    <form method="POST">
        <div class="form-group">
            <label for="ci">CI</label>
            <input type="text" id="ci" name="ci" required maxlength="20">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="nombres">Nombres</label>
                <input type="text" id="nombres" name="nombres" required maxlength="100">
            </div>
            <div class="form-group">
                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos" name="apellidos" required maxlength="100">
            </div>
        </div>
        <div class="form-group">
            <label for="licencia">Licencia</label>
            <input type="text" id="licencia" name="licencia" required maxlength="30">
        </div>
        <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" name="telefono" maxlength="20">
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{{ url_for('choferes.listar') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
