{% extends "base.html" %}
{% block title %}Nueva venta{% endblock %}
{% block content %}
<h2 class="mb-2">Registrar venta de boletos</h2>

<form method="POST" id="form-venta">
    <div class="grid grid-2">
        <div class="card">
            <h3>1. Viaje y asientos</h3>
            <div class="form-group">
                <label for="id_viaje">Viaje</label>
                <select id="id_viaje" name="id_viaje" required>
                    <option value="">Seleccionar viaje...</option>
                    {% for v in viajes %}
                    <option value="{{ v.id_viaje }}" {% if request.args.get('id_viaje')|string == v.id_viaje|string %}selected{% endif %}>
                        {{ v.origen }} → {{ v.destino }} | {{ v.fecha_viaje.strftime("%d/%m/%Y") }} {{ v.hora_salida.strftime("%H:%M") }} | Bus {{ v.bus.placa }} | Bs {{ "%.2f"|format(v.precio) }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <label>Mapa de asientos</label>
            <div id="seat-map" class="seat-map">
                <p class="text-muted">Selecciona un viaje para ver los asientos.</p>
            </div>
            <div class="seat-legend">
                <div class="seat-legend-item"><span class="seat-legend-box" style="background:#fff;"></span> Disponible</div>
                <div class="seat-legend-item"><span class="seat-legend-box" style="background:#2563eb; border-color:#1d4ed8;"></span> Seleccionado</div>
                <div class="seat-legend-item"><span class="seat-legend-box" style="background:#f1f5f9;"></span> Ocupado</div>
            </div>
        </div>

        <div class="card">
            <h3>2. Datos del pasajero</h3>
            <div class="form-group">
                <label for="ci">CI</label>
                <input type="text" id="ci" name="ci" required maxlength="20" placeholder="Cédula de identidad">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="nombres">Nombres</label>
                    <input type="text" id="nombres" name="nombres" required maxlength="100">
                </div>
                <div class="form-group">
                    <label for="apellidos">Apellidos</label>
                    <input type="text" id="apellidos" name="apellidos" required maxlength="100">
                </div>
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono" name="telefono" maxlength="20">
            </div>

            <h3 class="mt-2">3. Pago</h3>
            <div class="form-group">
                <label>Precio por asiento</label>
                <p id="precio-info" class="stat-value" style="font-size:1.2rem;">Bs 0.00</p>
            </div>
            <div class="form-group">
                <label>Total a pagar</label>
                <p id="total-info" class="stat-value" style="font-size:1.4rem; color:#2563eb;" data-total="0">Bs 0.00</p>
            </div>
            <div class="form-group">
                <label for="monto_pagado">Monto que entrega el cliente (Bs)</label>
                <input type="number" id="monto_pagado" name="monto_pagado" step="0.01" min="0" required>
            </div>
            <div class="form-group">
                <label>Cambio a devolver</label>
                <p id="cambio-info" class="stat-value" style="font-size:1.2rem;">Bs 0.00</p>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-success">Registrar venta</button>
                <a href="{{ url_for('ventas.listar') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </div>
    </div>
</form>
{% endblock %}
