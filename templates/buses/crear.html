{% extends "base.html" %}
{% block title %}Nuevo bus{% endblock %}
{% block content %}
<h2 class="mb-2">Registrar bus</h2>

<div class="card" style="max-width:500px;">
    <form method="POST">
        <div class="form-group">
            <label for="placa">Placa</label>
            <input type="text" id="placa" name="placa" required maxlength="20" placeholder="Ej. 1234-ABC">
        </div>
        <div class="form-group">
            <label for="modelo">Modelo</label>
            <input type="text" id="modelo" name="modelo" required maxlength="50" placeholder="Ej. Mercedes Benz O500">
        </div>
        <div class="form-group">
            <label for="capacidad">Capacidad (Nº de asientos)</label>
            <input type="number" id="capacidad" name="capacidad" required min="1" max="80" value="40">
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{{ url_for('buses.listar') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
